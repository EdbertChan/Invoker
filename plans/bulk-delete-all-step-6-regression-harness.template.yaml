name: "Bulk Delete-All Step 6: regression harness updates"
description: |
  Goal:
  Encode correctness and performance expectations for both legacy and bulk delete-all paths.

  Motivation:
  Protect compatibility while proving bulk semantics suppress per-task remove deltas.

  Implementation details:
  - add or expand targeted tests in workflow-core, app, and ui packages.
  - retain reproducible performance-oriented regression signal in UI repro suite.

  Alternative considerations:
  - rely only on broad package tests.
  - add behavior checks but skip repro/perf guard.

  Competing-design proof:
  - show uncovered acceptance criteria under broad-only or behavior-only approaches.

  Why this design is better:
  Combined behavior plus repro checks reduce both correctness and performance regressions.
onFinish: pull_request
mergeMode: external_review
baseBranch: master
repoUrl: git@github.com:EdbertChan/Invoker.git
executorType: worktree

externalDependencies:
  - workflowId: "__UPSTREAM_WORKFLOW_ID__"
    requiredStatus: completed

tasks:
  - id: add-bulk-delete-regression-tests
    description: |
      Layer: app_regression
      Feature state: active
      Goal:
      Capture legacy-vs-bulk delete expectations in deterministic tests.
      Motivation:
      Prevent semantic drift in orchestrator, app lifecycle, coordinator, and UI mocks.
      Implementation details:
      - update touched package tests with explicit legacy and bulk assertions.
      Alternative considerations:
      - broad suite only without targeted assertions.
      - targeted assertions without repro test continuity.
      Competing-design proof:
      - demonstrate targeted assertions cover bulk suppression and compatibility invariants.
      Why this design is better:
      - precise, reviewable checks for the exact regression class.
      Files:
      - packages/workflow-core/src/__tests__/orchestrator.test.ts
      - packages/app/src/__tests__/delete-all-lifecycle.test.ts
      - packages/app/src/__tests__/persisted-workflow-mutation-coordinator.test.ts
      - packages/ui/src/__tests__/app-launch.test.tsx
      Change types:
      - add assertions for legacy-vs-bulk delete semantics
      - ensure mocks/types include bulk method coverage
      Acceptance criteria:
      - tests prove delta fan-out is suppressed only in bulk path.
      - tests prove legacy APIs remain backward compatible.
    prompt: |
      Goal:
      Deliver `add-bulk-delete-regression-tests` with explicit, reviewable intent.
      Motivation:
      Keep implementation rationale explicit so lint and reviewers can verify intent.
      Alternative considerations:
      - Keep this prompt concise without rationale sections.
      - Rely only on task description for rationale context.
      Implementation details:
      - Apply the file-level changes listed below and verify all acceptance expectations.
      Expand regression tests in:
      - `packages/workflow-core/src/__tests__/orchestrator.test.ts`
      - `packages/app/src/__tests__/delete-all-lifecycle.test.ts`
      - `packages/app/src/__tests__/persisted-workflow-mutation-coordinator.test.ts`
      - `packages/ui/src/__tests__/app-launch.test.tsx`
      You must ensure orchestrator/app/UI suites validate both delete-all variants.
      Verify the bulk path suppresses per-task removals and queue fencing stays correct,
      while legacy paths continue asserting existing behavior. You must also ensure
      `packages/ui/src/__tests__/delete-history-repro.test.ts` remains a regression reference.
    dependencies: []

  - id: run-app-targeted-regression
    description: |
      Layer: app_regression
      Feature state: active
      Goal:
      Define the expected outcome for `run-app-targeted-regression`.
      Motivation:
      Preserve reviewability and explicit implementation rationale for this step.
      Alternative considerations:
      - Keep this step implicit in broader workflow text only.
      - Rely on command names without per-task rationale headings.
      Implementation details:
      - Execute this task exactly as specified and verify stated acceptance criteria.
      Run targeted tests that exercised the verified root-cause area.
    command: "cd packages/app && pnpm test -- src/__tests__/delete-all-lifecycle.test.ts src/__tests__/persisted-workflow-mutation-coordinator.test.ts"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - add-bulk-delete-regression-tests

  - id: run-domain-targeted-regression
    description: |
      Layer: app_regression
      Feature state: active
      Goal:
      Define the expected outcome for `run-domain-targeted-regression`.
      Motivation:
      Preserve reviewability and explicit implementation rationale for this step.
      Alternative considerations:
      - Keep this step implicit in broader workflow text only.
      - Rely on command names without per-task rationale headings.
      Implementation details:
      - Execute this task exactly as specified and verify stated acceptance criteria.
      Run workflow-core targeted regression.
    command: "cd packages/workflow-core && pnpm test -- src/__tests__/orchestrator.test.ts"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - run-app-targeted-regression

  - id: run-ui-targeted-regression
    description: |
      Layer: e2e_regression
      Feature state: active
      Goal:
      Define the expected outcome for `run-ui-targeted-regression`.
      Motivation:
      Preserve reviewability and explicit implementation rationale for this step.
      Alternative considerations:
      - Keep this step implicit in broader workflow text only.
      - Rely on command names without per-task rationale headings.
      Implementation details:
      - Execute this task exactly as specified and verify stated acceptance criteria.
      Run UI targeted regression around delete-history reproduction.
    command: "cd packages/ui && pnpm test -- src/__tests__/delete-history-repro.test.ts"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - run-domain-targeted-regression

  - id: post-fix-regression
    description: |
      Layer: e2e_regression
      Feature state: active
      Goal:
      Define the expected outcome for `post-fix-regression`.
      Motivation:
      Preserve reviewability and explicit implementation rationale for this step.
      Alternative considerations:
      - Keep this step implicit in broader workflow text only.
      - Rely on command names without per-task rationale headings.
      Implementation details:
      - Execute this task exactly as specified and verify stated acceptance criteria.
      Final regression gate required for merge-ready implementation workflows.
    command: "pnpm run test:all"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - add-bulk-delete-regression-tests
      - run-app-targeted-regression
      - run-domain-targeted-regression
      - run-ui-targeted-regression
