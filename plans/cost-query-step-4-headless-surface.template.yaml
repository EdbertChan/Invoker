name: "Cost Query Step 4: headless query commands (replacement v2)"
description: |
  Goal:
  - Expose first-class read-only CLI query surfaces for cost rollups and raw usage events.

  Motivation:
  - Product direction is query/export first, not built-in dashboard analytics.

  Alternatives considered:
  - Option A (chosen): `query cost` + `query cost-events` under existing query namespace.
  - Option B: separate top-level `cost` command family.

  Why chosen:
  - Option A preserves user mental model and reuses existing output modes/patterns.

  Implementation contract:
  - `query cost` supports one-of `--all` or `--workflow <id>`, optional `--task`, optional `--group-by`.
  - `query cost-events` returns raw normalized events.
  - Output modes: text/json/jsonl; `query cost` also supports label scalar.
  - Invalid flags must fail with deterministic error messages.
onFinish: pull_request
mergeMode: external_review
baseBranch: master
repoUrl: git@github.com:EdbertChan/Invoker.git
executorType: worktree

externalDependencies:
  - workflowId: "__UPSTREAM_WORKFLOW_ID__"
    requiredStatus: completed
    gatePolicy: review_ready

tasks:
  - id: implement-headless-cost-queries
    description: |
      Layer: contact_surface
      Feature state: active
      Goal:
      - Add first-class read-only CLI surfaces for rollups and raw cost usage events.
      Motivation:
      - Product direction is query/export capability without in-product dashboarding.
      Alternative considerations:
      - Option A (chosen): add `query cost` and `query cost-events`
      - Option B: separate top-level `cost` command family
      Chosen design rationale:
      - Keeps read-only operational reporting in existing query namespace and output conventions.
      Implementation details:
      - Add query flag parsing/validation for scope and group-by.
      - Emit stable JSON/JSONL/text/label outputs with deterministic shapes.
      - Keep query behaviors read-only and consistent with existing query command patterns.
      Acceptance criteria:
      - `query cost` supports workflow/task filters, grouping, and output modes.
      - `query cost-events` emits raw normalized events for external analytics tooling.
      - CLI help and README include examples.
    prompt: |
      Goal:
      - Provide first-class read-only CLI commands for cost rollups and raw normalized usage events.
      Motivation:
      - Support optimization workflows through scripting/query surfaces instead of built-in dashboard UI.
      Alternative considerations:
      - Option A (chosen): extend existing query namespace with cost subcommands.
      - Option B: introduce a separate top-level cost command family.
      Implementation details:
      - Add query parsing/validation and deterministic formatter output contracts.
      - Keep output mode behavior aligned with existing headless query conventions.
      Files:
      - packages/app/src/headless.ts
      - packages/app/src/formatter.ts
      - packages/app/src/__tests__/*.test.ts
      - README.md
      Implement headless query subcommands:
      - query cost
      - query cost-events
      Must ensure flag validation errors are deterministic and script-friendly.
      Reuse existing output format patterns (text/json/jsonl/label where appropriate).
      Required JSON shape for `query cost`:
      { scope, groupBy, totals, groups, metadata }.
      Add formatter updates and docs updates.
      Competing-design proof:
      - Tests show option/output parity with existing query commands.
      - Script example demonstrates JSONL piping without special command handling.
    dependencies: []

  - id: run-headless-query-tests
    description: |
      Layer: app_regression
      Feature state: active
      Goal:
      - Validate new headless cost query command behavior with focused app tests.
      Motivation:
      - Confirm flag semantics/output contracts before full-suite verification.
      Alternative considerations:
      - Option A (chosen): focused headless command lane.
      - Option B: rely only on final full-repo tests.
      Implementation details:
      - Execute app package tests immediately after contact-surface changes.
      Acceptance criteria:
      - Headless command tests for new query surface pass.
    command: "cd packages/app && pnpm test"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - implement-headless-cost-queries

  - id: post-fix-regression
    description: |
      Layer: app_regression
      Feature state: active
      Goal:
      - Run terminal full-repo regression gate for CLI surface changes.
      Motivation:
      - Ensure new query commands do not regress unrelated runtime behavior.
      Alternative considerations:
      - Option A (chosen): full repository suite.
      - Option B: app-only tests.
      Implementation details:
      - Execute `pnpm run test:all` after focused query lane.
      Acceptance criteria:
      - Full repository regression passes.
    command: "pnpm run test:all"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - implement-headless-cost-queries
      - run-headless-query-tests
