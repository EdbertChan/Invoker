name: "Roadmap Core WF-INV-119: Pipeline runtime reduction"
description: |
  Implements Roadmap Core issue INV-119 as a standalone chained workflow.

  Decision record and experimentation are first-class deliverables: experiment artifacts
  must be committed during workflow execution and consumed by implementation tasks.
onFinish: pull_request
mergeMode: external_review
repoUrl: https://github.com/EdbertChan/Invoker
baseBranch: "__UPSTREAM_FEATURE_BRANCH__"
externalDependencies:
  - workflowId: "__WF_INV_67_WORKFLOW_ID__"
    requiredStatus: review_ready

tasks:
  - id: experiment-inv-119
    description: |
      Design experiment and alternative proof task for INV-119.
      Goal: Reduce end-to-end test pipeline wall-clock time.
      Motivation: Improve feedback loops without coverage loss.
      Alternative considerations: CI matrix/caching first vs local orchestrator first.
      Implementation details: 1) Introduce or adjust boundaries in `.github/workflows/ci.yml`, `scripts/run-all-tests.sh`, `scripts/test-suites/required/20-e2e-dry-run.sh`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-119/experiment-brief.md` and consume it in implementation.
      Layer: app_regression
      Feature state: active
      Files:
      - .github/workflows/ci.yml
      - scripts/run-all-tests.sh
      - scripts/test-suites/required/20-e2e-dry-run.sh
      - docs/context/inv-119/experiment-brief.md
      Change types:
      - modify
      - docs-only
      Acceptance criteria:
      - Produce measurable comparison criteria for chosen and alternative designs.
      - Record verdict per option: Supported / Rejected / Deferred.
      - Commit `docs/context/inv-119/experiment-brief.md` with experiment findings and explicit thresholds.
    prompt: |
      You must design an experiment brief for INV-119 and ensure deterministic evaluation.
      Goal: Reduce end-to-end test pipeline wall-clock time.
      Motivation: Improve feedback loops without coverage loss.
      Implementation details: 1) Introduce or adjust boundaries in `.github/workflows/ci.yml`, `scripts/run-all-tests.sh`, `scripts/test-suites/required/20-e2e-dry-run.sh`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-119/experiment-brief.md` and consume it in implementation.
      Alternative considerations: CI matrix/caching first vs local orchestrator first.
      Chosen design: CI matrix/caching optimization first.
      Why chosen over alternatives: Largest immediate impact on PR feedback latency.
      Experiment plan: Baseline CI timings then apply staged cache/matrix changes.
      Alternative proof evidence: Use CI p50/p95 duration, flake rate, and runner-minute cost.
      Alternative considerations: Use experiment findings to compare retained and rejected designs before implementation decisions.
      Decision gate: Keep CI changes only if latency improves without flake regression.
      Concrete files to inspect and reference: `.github/workflows/ci.yml`, `scripts/run-all-tests.sh`, `scripts/test-suites/required/20-e2e-dry-run.sh`.
      You must create or update `docs/context/inv-119/experiment-brief.md` and commit it in this task.
      Ensure each alternative has deterministic command(s), expected outputs, and pass/fail thresholds.
    dependencies: []

  - id: implement-inv-119
    description: |
      Implement chosen design for INV-119 after experiment framing.
      Goal: Reduce end-to-end test pipeline wall-clock time.
      Motivation: Improve feedback loops without coverage loss.
      Alternative considerations: CI matrix/caching first vs local orchestrator first.
      Implementation details: 1) Introduce or adjust boundaries in `.github/workflows/ci.yml`, `scripts/run-all-tests.sh`, `scripts/test-suites/required/20-e2e-dry-run.sh`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-119/experiment-brief.md` and consume it in implementation.
      Layer: app_regression
      Feature state: active
      Files:
      - .github/workflows/ci.yml
      - scripts/run-all-tests.sh
      - scripts/test-suites/required/20-e2e-dry-run.sh
      - docs/context/inv-119/experiment-brief.md
      Change types:
      - modify
      Acceptance criteria:
      - Code reflects chosen design and references measured experiment outcomes.
      - Rejected/deferred alternatives are documented with reasons.
      - Implementation explicitly consumes `docs/context/inv-119/experiment-brief.md` findings.
    prompt: |
      You must implement INV-119 using chosen design CI matrix/caching optimization first. and ensure acceptance criteria are verified.
      Goal: Reduce end-to-end test pipeline wall-clock time.
      Motivation: Improve feedback loops without coverage loss.
      Implementation details: 1) Introduce or adjust boundaries in `.github/workflows/ci.yml`, `scripts/run-all-tests.sh`, `scripts/test-suites/required/20-e2e-dry-run.sh`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-119/experiment-brief.md` and consume it in implementation.
      Alternative considerations: Use experiment findings to compare retained and rejected designs before implementation decisions.
      Decision gate: Keep CI changes only if latency improves without flake regression.
      Concrete files to update or validate: `.github/workflows/ci.yml`, `scripts/run-all-tests.sh`, `scripts/test-suites/required/20-e2e-dry-run.sh`.
      You must read `docs/context/inv-119/experiment-brief.md` and apply its decisions/thresholds to implementation choices.
      Ensure targeted tests are added or updated and verify expected outcomes before final regression.
    dependencies:
      - experiment-inv-119

  - id: verify-inv-119
    description: |
      Targeted verification for INV-119.
      Goal:
      Complete verify-inv-119 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: app_regression
      Feature state: active
      Files:
      - tests
      - docs/context/inv-119/experiment-brief.md
      Change types:
      - test-only
      Acceptance criteria:
      - cd packages/app && pnpm test exits 0.
      - Proof verdicts are reflected in `docs/context/inv-119/experiment-brief.md` and workflow output notes.
    command: "cd packages/app && pnpm test"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_2
    dependencies:
      - implement-inv-119

  - id: cleanup-experiment-artifacts-inv-119
    description: |
      Cleanup persisted experiment artifact for INV-119 before final regression.
      Goal:
      Complete cleanup-experiment-artifacts-inv-119 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: docs
      Feature state: active
      Files:
      - docs/context/inv-119/experiment-brief.md
      Change types:
      - delete
      Acceptance criteria:
      - `docs/context/inv-119/experiment-brief.md` is removed from the branch.
      - Cleanup commit is present before final regression task.
    command: 'rm -f docs/context/inv-119/experiment-brief.md && git add docs/context/inv-119/experiment-brief.md && git commit -m "cleanup(inv-119/experiment-brief): remove artifact after implementation handoff"'
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - experiment-inv-119
      - implement-inv-119
      - verify-inv-119

  - id: regression-inv-119
    description: |
      Final regression gate for INV-119 workflow.
      Goal:
      Complete regression-inv-119 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: app_regression
      Feature state: active
      Files:
      - repository
      Change types:
      - none
      Acceptance criteria:
      - pnpm run test:all exits 0.
      - Workflow notes include proof verdicts for each alternative.
      Layer exception: allowed — final regression intentionally depends on docs cleanup to guarantee artifact removal before gate.
    command: "pnpm run test:all"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_2
    dependencies:
      - experiment-inv-119
      - implement-inv-119
      - verify-inv-119
      - cleanup-experiment-artifacts-inv-119
