name: "Roadmap Core WF-INV-63: Skill/docs drift elimination"
description: |
  Implements Roadmap Core issue INV-63 as a standalone chained workflow.

  Decision record and experimentation are first-class deliverables: experiment artifacts
  must be committed during workflow execution and consumed by implementation tasks.
onFinish: pull_request
mergeMode: external_review
repoUrl: https://github.com/EdbertChan/Invoker
baseBranch: "__UPSTREAM_FEATURE_BRANCH__"
externalDependencies:
  - workflowId: "__WF_INV_130_WORKFLOW_ID__"
    requiredStatus: review_ready

tasks:
  - id: experiment-inv-63
    description: |
      Design experiment and alternative proof task for INV-63.
      Goal: Consolidate skill/docs surfaces to prevent drift.
      Motivation: Keep one canonical plan-to-invoker process.
      Alternative considerations: Single canonical tree with generated mirrors vs audience split.
      Implementation details: 1) Introduce or adjust boundaries in `skills/plan-to-invoker/SKILL.md`, `.cursor/skills/plan-to-invoker/SKILL.md`, `skills/plan-to-invoker/scripts/skill-doctor.sh`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-63/experiment-brief.md` and consume it in implementation.
      Layer: domain
      Feature state: active
      Files:
      - skills/plan-to-invoker/SKILL.md
      - .cursor/skills/plan-to-invoker/SKILL.md
      - skills/plan-to-invoker/scripts/skill-doctor.sh
      - docs/context/inv-63/experiment-brief.md
      Change types:
      - modify
      - docs-only
      Acceptance criteria:
      - Produce measurable comparison criteria for chosen and alternative designs.
      - Record verdict per option: Supported / Rejected / Deferred.
      - Commit `docs/context/inv-63/experiment-brief.md` with experiment findings and explicit thresholds.
    prompt: |
      You must design an experiment brief for INV-63 and ensure deterministic evaluation.
      Goal: Consolidate skill/docs surfaces to prevent drift.
      Motivation: Keep one canonical plan-to-invoker process.
      Implementation details: 1) Introduce or adjust boundaries in `skills/plan-to-invoker/SKILL.md`, `.cursor/skills/plan-to-invoker/SKILL.md`, `skills/plan-to-invoker/scripts/skill-doctor.sh`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-63/experiment-brief.md` and consume it in implementation.
      Alternative considerations: Single canonical tree with generated mirrors vs audience split.
      Chosen design: Single canonical tree with generated mirrors.
      Why chosen over alternatives: Strongest drift prevention with deterministic validation.
      Experiment plan: Run mirror sync generator and dual-edit drift simulation.
      Alternative proof evidence: Use checksum drift detection and path-resolution checks.
      Alternative considerations: Use experiment findings to compare retained and rejected designs before implementation decisions.
      Decision gate: Adopt only if drift is zero and path resolution remains stable.
      Concrete files to inspect and reference: `skills/plan-to-invoker/SKILL.md`, `.cursor/skills/plan-to-invoker/SKILL.md`, `skills/plan-to-invoker/scripts/skill-doctor.sh`.
      You must create or update `docs/context/inv-63/experiment-brief.md` and commit it in this task.
      Ensure each alternative has deterministic command(s), expected outputs, and pass/fail thresholds.
    dependencies: []

  - id: implement-inv-63
    description: |
      Implement chosen design for INV-63 after experiment framing.
      Goal: Consolidate skill/docs surfaces to prevent drift.
      Motivation: Keep one canonical plan-to-invoker process.
      Alternative considerations: Single canonical tree with generated mirrors vs audience split.
      Implementation details: 1) Introduce or adjust boundaries in `skills/plan-to-invoker/SKILL.md`, `.cursor/skills/plan-to-invoker/SKILL.md`, `skills/plan-to-invoker/scripts/skill-doctor.sh`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-63/experiment-brief.md` and consume it in implementation.
      Layer: domain
      Feature state: active
      Files:
      - skills/plan-to-invoker/SKILL.md
      - .cursor/skills/plan-to-invoker/SKILL.md
      - skills/plan-to-invoker/scripts/skill-doctor.sh
      - docs/context/inv-63/experiment-brief.md
      Change types:
      - modify
      Acceptance criteria:
      - Code reflects chosen design and references measured experiment outcomes.
      - Rejected/deferred alternatives are documented with reasons.
      - Implementation explicitly consumes `docs/context/inv-63/experiment-brief.md` findings.
    prompt: |
      You must implement INV-63 using chosen design Single canonical tree with generated mirrors. and ensure acceptance criteria are verified.
      Goal: Consolidate skill/docs surfaces to prevent drift.
      Motivation: Keep one canonical plan-to-invoker process.
      Implementation details: 1) Introduce or adjust boundaries in `skills/plan-to-invoker/SKILL.md`, `.cursor/skills/plan-to-invoker/SKILL.md`, `skills/plan-to-invoker/scripts/skill-doctor.sh`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-63/experiment-brief.md` and consume it in implementation.
      Alternative considerations: Use experiment findings to compare retained and rejected designs before implementation decisions.
      Decision gate: Adopt only if drift is zero and path resolution remains stable.
      Concrete files to update or validate: `skills/plan-to-invoker/SKILL.md`, `.cursor/skills/plan-to-invoker/SKILL.md`, `skills/plan-to-invoker/scripts/skill-doctor.sh`.
      You must read `docs/context/inv-63/experiment-brief.md` and apply its decisions/thresholds to implementation choices.
      Ensure targeted tests are added or updated and verify expected outcomes before final regression.
    dependencies:
      - experiment-inv-63

  - id: verify-inv-63
    description: |
      Targeted verification for INV-63.
      Goal:
      Complete verify-inv-63 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: app_regression
      Feature state: active
      Files:
      - tests
      - docs/context/inv-63/experiment-brief.md
      Change types:
      - test-only
      Acceptance criteria:
      - bash scripts/test-plan-to-invoker-skill.sh exits 0.
      - Proof verdicts are reflected in `docs/context/inv-63/experiment-brief.md` and workflow output notes.
    command: "bash scripts/test-plan-to-invoker-skill.sh"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - implement-inv-63

  - id: cleanup-experiment-artifacts-inv-63
    description: |
      Cleanup persisted experiment artifact for INV-63 before final regression.
      Goal:
      Complete cleanup-experiment-artifacts-inv-63 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: docs
      Feature state: active
      Files:
      - docs/context/inv-63/experiment-brief.md
      Change types:
      - delete
      Acceptance criteria:
      - `docs/context/inv-63/experiment-brief.md` is removed from the branch.
      - Cleanup commit is present before final regression task.
    command: 'rm -f docs/context/inv-63/experiment-brief.md && git add docs/context/inv-63/experiment-brief.md && git commit -m "cleanup(inv-63/experiment-brief): remove artifact after implementation handoff"'
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - experiment-inv-63
      - implement-inv-63
      - verify-inv-63

  - id: regression-inv-63
    description: |
      Final regression gate for INV-63 workflow.
      Goal:
      Complete regression-inv-63 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: app_regression
      Feature state: active
      Files:
      - repository
      Change types:
      - none
      Acceptance criteria:
      - pnpm run test:all exits 0.
      - Workflow notes include proof verdicts for each alternative.
      Layer exception: allowed — final regression intentionally depends on docs cleanup to guarantee artifact removal before gate.
    command: "pnpm run test:all"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_2
    dependencies:
      - experiment-inv-63
      - implement-inv-63
      - verify-inv-63
      - cleanup-experiment-artifacts-inv-63
