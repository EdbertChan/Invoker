name: "Roadmap Core WF-INV-130: API ownership boundary cleanup"
description: |
  Implements Roadmap Core issue INV-130 as a standalone chained workflow.

  Decision record and experimentation are first-class deliverables: experiment artifacts
  must be committed during workflow execution and consumed by implementation tasks.
onFinish: pull_request
mergeMode: external_review
repoUrl: https://github.com/EdbertChan/Invoker
baseBranch: "__UPSTREAM_FEATURE_BRANCH__"
externalDependencies:
  - workflowId: "__WF_INV_74_WORKFLOW_ID__"
    requiredStatus: review_ready

tasks:
  - id: experiment-inv-130
    description: |
      Design experiment and alternative proof task for INV-130.
      Goal: Remove dispatch ownership leakage from API contracts.
      Motivation: Keep API boundary stable and less coupled to orchestrator internals.
      Alternative considerations: Facade-only boundary vs dedicated typed read port.
      Implementation details: 1) Introduce or adjust boundaries in `packages/app/src/api-server.ts`, `packages/workflow-core/src/orchestrator.ts`, `packages/app/src/__tests__/api-server.test.ts`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-130/experiment-brief.md` and consume it in implementation.
      Layer: api
      Feature state: active
      Files:
      - packages/app/src/api-server.ts
      - packages/workflow-core/src/orchestrator.ts
      - packages/app/src/__tests__/api-server.test.ts
      - docs/context/inv-130/experiment-brief.md
      Change types:
      - modify
      - docs-only
      Acceptance criteria:
      - Produce measurable comparison criteria for chosen and alternative designs.
      - Record verdict per option: Supported / Rejected / Deferred.
      - Commit `docs/context/inv-130/experiment-brief.md` with experiment findings and explicit thresholds.
    prompt: |
      You must design an experiment brief for INV-130 and ensure deterministic evaluation.
      Goal: Remove dispatch ownership leakage from API contracts.
      Motivation: Keep API boundary stable and less coupled to orchestrator internals.
      Implementation details: 1) Introduce or adjust boundaries in `packages/app/src/api-server.ts`, `packages/workflow-core/src/orchestrator.ts`, `packages/app/src/__tests__/api-server.test.ts`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-130/experiment-brief.md` and consume it in implementation.
      Alternative considerations: Facade-only boundary vs dedicated typed read port.
      Chosen design: Dedicated typed read port.
      Why chosen over alternatives: Avoids mutation-facade overload while reducing orchestrator coupling.
      Experiment plan: Migrate one endpoint family under each boundary model and compare complexity.
      Alternative proof evidence: Use API contract pass-rate and dependency-graph coupling metrics.
      Alternative considerations: Use experiment findings to compare retained and rejected designs before implementation decisions.
      Decision gate: Adopt only if contract parity holds and coupling decreases.
      Concrete files to inspect and reference: `packages/app/src/api-server.ts`, `packages/workflow-core/src/orchestrator.ts`, `packages/app/src/__tests__/api-server.test.ts`.
      You must create or update `docs/context/inv-130/experiment-brief.md` and commit it in this task.
      Ensure each alternative has deterministic command(s), expected outputs, and pass/fail thresholds.
    dependencies: []

  - id: implement-inv-130
    description: |
      Implement chosen design for INV-130 after experiment framing.
      Goal: Remove dispatch ownership leakage from API contracts.
      Motivation: Keep API boundary stable and less coupled to orchestrator internals.
      Alternative considerations: Facade-only boundary vs dedicated typed read port.
      Implementation details: 1) Introduce or adjust boundaries in `packages/app/src/api-server.ts`, `packages/workflow-core/src/orchestrator.ts`, `packages/app/src/__tests__/api-server.test.ts`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-130/experiment-brief.md` and consume it in implementation.
      Layer: api
      Feature state: active
      Files:
      - packages/app/src/api-server.ts
      - packages/workflow-core/src/orchestrator.ts
      - packages/app/src/__tests__/api-server.test.ts
      - docs/context/inv-130/experiment-brief.md
      Change types:
      - modify
      Acceptance criteria:
      - Code reflects chosen design and references measured experiment outcomes.
      - Rejected/deferred alternatives are documented with reasons.
      - Implementation explicitly consumes `docs/context/inv-130/experiment-brief.md` findings.
    prompt: |
      You must implement INV-130 using chosen design Dedicated typed read port. and ensure acceptance criteria are verified.
      Goal: Remove dispatch ownership leakage from API contracts.
      Motivation: Keep API boundary stable and less coupled to orchestrator internals.
      Implementation details: 1) Introduce or adjust boundaries in `packages/app/src/api-server.ts`, `packages/workflow-core/src/orchestrator.ts`, `packages/app/src/__tests__/api-server.test.ts`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-130/experiment-brief.md` and consume it in implementation.
      Alternative considerations: Use experiment findings to compare retained and rejected designs before implementation decisions.
      Decision gate: Adopt only if contract parity holds and coupling decreases.
      Concrete files to update or validate: `packages/app/src/api-server.ts`, `packages/workflow-core/src/orchestrator.ts`, `packages/app/src/__tests__/api-server.test.ts`.
      You must read `docs/context/inv-130/experiment-brief.md` and apply its decisions/thresholds to implementation choices.
      Ensure targeted tests are added or updated and verify expected outcomes before final regression.
    dependencies:
      - experiment-inv-130

  - id: verify-inv-130
    description: |
      Targeted verification for INV-130.
      Goal:
      Complete verify-inv-130 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: app_regression
      Feature state: active
      Files:
      - tests
      - docs/context/inv-130/experiment-brief.md
      Change types:
      - test-only
      Acceptance criteria:
      - cd packages/app && pnpm test exits 0.
      - Proof verdicts are reflected in `docs/context/inv-130/experiment-brief.md` and workflow output notes.
    command: "cd packages/app && pnpm test"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_2
    dependencies:
      - implement-inv-130

  - id: cleanup-experiment-artifacts-inv-130
    description: |
      Cleanup persisted experiment artifact for INV-130 before final regression.
      Goal:
      Complete cleanup-experiment-artifacts-inv-130 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: docs
      Feature state: active
      Files:
      - docs/context/inv-130/experiment-brief.md
      Change types:
      - delete
      Acceptance criteria:
      - `docs/context/inv-130/experiment-brief.md` is removed from the branch.
      - Cleanup commit is present before final regression task.
    command: 'rm -f docs/context/inv-130/experiment-brief.md && git add docs/context/inv-130/experiment-brief.md && git commit -m "cleanup(inv-130/experiment-brief): remove artifact after implementation handoff"'
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - experiment-inv-130
      - implement-inv-130
      - verify-inv-130

  - id: regression-inv-130
    description: |
      Final regression gate for INV-130 workflow.
      Goal:
      Complete regression-inv-130 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: app_regression
      Feature state: active
      Files:
      - repository
      Change types:
      - none
      Acceptance criteria:
      - pnpm run test:all exits 0.
      - Workflow notes include proof verdicts for each alternative.
      Layer exception: allowed — final regression intentionally depends on docs cleanup to guarantee artifact removal before gate.
    command: "pnpm run test:all"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_2
    dependencies:
      - experiment-inv-130
      - implement-inv-130
      - verify-inv-130
      - cleanup-experiment-artifacts-inv-130
