name: "Roadmap Core WF-INV-117: Pipeline architecture experimentation"
description: |
  Implements Roadmap Core issue INV-117 as a standalone chained workflow.

  Decision record and experimentation are first-class deliverables: experiment artifacts
  must be committed during workflow execution and consumed by implementation tasks.
onFinish: pull_request
mergeMode: external_review
repoUrl: https://github.com/EdbertChan/Invoker
baseBranch: "__UPSTREAM_FEATURE_BRANCH__"
externalDependencies:
  - workflowId: "__WF_INV_119_WORKFLOW_ID__"
    requiredStatus: review_ready

tasks:
  - id: experiment-inv-117
    description: |
      Design experiment and alternative proof task for INV-117.
      Goal: Evaluate alternate runtime/pipeline architecture options.
      Motivation: Choose whether to retain or migrate current architecture.
      Alternative considerations: Incremental improvement vs migration to consolidated orchestration/caching.
      Implementation details: 1) Introduce or adjust boundaries in `.github/workflows/ci.yml`, `scripts/workspace-test.sh`, `scripts/run-all-tests.sh`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-117/experiment-brief.md` and consume it in implementation.
      Layer: domain
      Feature state: dormant
      Files:
      - .github/workflows/ci.yml
      - scripts/workspace-test.sh
      - scripts/run-all-tests.sh
      - docs/context/inv-117/experiment-brief.md
      Change types:
      - modify
      - docs-only
      Acceptance criteria:
      - Produce measurable comparison criteria for chosen and alternative designs.
      - Record verdict per option: Supported / Rejected / Deferred.
      - Commit `docs/context/inv-117/experiment-brief.md` with experiment findings and explicit thresholds.
    prompt: |
      You must design an experiment brief for INV-117 and ensure deterministic evaluation.
      Goal: Evaluate alternate runtime/pipeline architecture options.
      Motivation: Choose whether to retain or migrate current architecture.
      Implementation details: 1) Introduce or adjust boundaries in `.github/workflows/ci.yml`, `scripts/workspace-test.sh`, `scripts/run-all-tests.sh`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-117/experiment-brief.md` and consume it in implementation.
      Alternative considerations: Incremental improvement vs migration to consolidated orchestration/caching.
      Chosen design: Experiment-first (no immediate migration).
      Why chosen over alternatives: Preserves optionality and avoids premature risk.
      Experiment plan: Prototype two architectures and score against current baseline.
      Alternative proof evidence: Use weighted score across runtime, cost, and maintenance overhead.
      Alternative considerations: Use experiment findings to compare retained and rejected designs before implementation decisions.
      Decision gate: Migrate only if prototype materially outperforms tuned baseline.
      Concrete files to inspect and reference: `.github/workflows/ci.yml`, `scripts/workspace-test.sh`, `scripts/run-all-tests.sh`.
      You must create or update `docs/context/inv-117/experiment-brief.md` and commit it in this task.
      Ensure each alternative has deterministic command(s), expected outputs, and pass/fail thresholds.
    dependencies: []

  - id: implement-inv-117
    description: |
      Implement chosen design for INV-117 after experiment framing.
      Goal: Evaluate alternate runtime/pipeline architecture options.
      Motivation: Choose whether to retain or migrate current architecture.
      Alternative considerations: Incremental improvement vs migration to consolidated orchestration/caching.
      Implementation details: 1) Introduce or adjust boundaries in `.github/workflows/ci.yml`, `scripts/workspace-test.sh`, `scripts/run-all-tests.sh`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-117/experiment-brief.md` and consume it in implementation.
      Layer: domain
      Feature state: dormant
      Files:
      - .github/workflows/ci.yml
      - scripts/workspace-test.sh
      - scripts/run-all-tests.sh
      - docs/context/inv-117/experiment-brief.md
      Change types:
      - modify
      Acceptance criteria:
      - Code reflects chosen design and references measured experiment outcomes.
      - Rejected/deferred alternatives are documented with reasons.
      - Implementation explicitly consumes `docs/context/inv-117/experiment-brief.md` findings.
    prompt: |
      You must implement INV-117 using chosen design Experiment-first (no immediate migration). and ensure acceptance criteria are verified.
      Goal: Evaluate alternate runtime/pipeline architecture options.
      Motivation: Choose whether to retain or migrate current architecture.
      Implementation details: 1) Introduce or adjust boundaries in `.github/workflows/ci.yml`, `scripts/workspace-test.sh`, `scripts/run-all-tests.sh`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-117/experiment-brief.md` and consume it in implementation.
      Alternative considerations: Use experiment findings to compare retained and rejected designs before implementation decisions.
      Decision gate: Migrate only if prototype materially outperforms tuned baseline.
      Concrete files to update or validate: `.github/workflows/ci.yml`, `scripts/workspace-test.sh`, `scripts/run-all-tests.sh`.
      You must read `docs/context/inv-117/experiment-brief.md` and apply its decisions/thresholds to implementation choices.
      Ensure targeted tests are added or updated and verify expected outcomes before final regression.
    dependencies:
      - experiment-inv-117

  - id: verify-inv-117
    description: |
      Targeted verification for INV-117.
      Goal:
      Complete verify-inv-117 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: app_regression
      Feature state: dormant
      Files:
      - tests
      - docs/context/inv-117/experiment-brief.md
      Change types:
      - test-only
      Acceptance criteria:
      - cd packages/app && pnpm test exits 0.
      - Proof verdicts are reflected in `docs/context/inv-117/experiment-brief.md` and workflow output notes.
      Layer exception: allowed — dormant exploration still requires regression/cleanup sequencing.
    command: "cd packages/app && pnpm test"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_2
    dependencies:
      - implement-inv-117

  - id: cleanup-experiment-artifacts-inv-117
    description: |
      Cleanup persisted experiment artifact for INV-117 before final regression.
      Goal:
      Complete cleanup-experiment-artifacts-inv-117 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: docs
      Feature state: dormant
      Files:
      - docs/context/inv-117/experiment-brief.md
      Change types:
      - delete
      Acceptance criteria:
      - `docs/context/inv-117/experiment-brief.md` is removed from the branch.
      - Cleanup commit is present before final regression task.
    command: 'rm -f docs/context/inv-117/experiment-brief.md && git add docs/context/inv-117/experiment-brief.md && git commit -m "cleanup(inv-117/experiment-brief): remove artifact after implementation handoff"'
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - experiment-inv-117
      - implement-inv-117
      - verify-inv-117

  - id: regression-inv-117
    description: |
      Final regression gate for INV-117 workflow.
      Goal:
      Complete regression-inv-117 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: app_regression
      Feature state: dormant
      Files:
      - repository
      Change types:
      - none
      Acceptance criteria:
      - pnpm run test:all exits 0.
      - Workflow notes include proof verdicts for each alternative.
      Layer exception: allowed — final regression intentionally depends on docs cleanup to guarantee artifact removal before gate.
      Layer exception: allowed — dormant exploration still requires regression/cleanup sequencing.
    command: "pnpm run test:all"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_2
    dependencies:
      - experiment-inv-117
      - implement-inv-117
      - verify-inv-117
      - cleanup-experiment-artifacts-inv-117
