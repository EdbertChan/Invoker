name: "Roadmap Core Chain A Integration"
description: |
  Chain-level integration workflow for Roadmap Core chain A.
  Verifies cumulative behavior after all issue workflows in the chain complete.
onFinish: pull_request
mergeMode: external_review
repoUrl: https://github.com/EdbertChan/Invoker
baseBranch: "plan/roadmap-core-wf-inv-86-non-invoker-workspace-compatibility"
externalDependencies:
  - workflowId: "wf-1778135734257-40"
    requiredStatus: review_ready

tasks:
  - id: verify-chain-a-targeted
    description: |
      Targeted chain A regression.
      Goal:
      Verify cumulative chain A behavior before final gate.
      Motivation:
      Preserve deterministic chain-level verification with explicit rationale.
      Alternative considerations:
      - rely on implicit workflow-level context only.
      - collapse targeted verification into final regression only.
      Implementation details:
      - execute the scoped verification command for this task.
      - keep dependency order explicit before final regression.
      Layer: app_regression
      Feature state: active
      Files:
      - packages/app
      Change types:
      - test-only
      Acceptance criteria:
      - cd packages/app && pnpm test exits 0.
    command: "cd packages/app && pnpm test"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_2
    dependencies: []

  - id: regression-chain-a
    description: |
      Final chain A regression gate.
      Goal:
      Verify cumulative chain A behavior before final gate.
      Motivation:
      Preserve deterministic chain-level verification with explicit rationale.
      Alternative considerations:
      - rely on implicit workflow-level context only.
      - collapse targeted verification into final regression only.
      Implementation details:
      - execute the scoped verification command for this task.
      - keep dependency order explicit before final regression.
      Layer: app_regression
      Feature state: active
      Files:
      - repository
      Change types:
      - none
      Acceptance criteria:
      - pnpm run test:all exits 0.
    command: "pnpm run test:all"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_2
    dependencies:
      - verify-chain-a-targeted
