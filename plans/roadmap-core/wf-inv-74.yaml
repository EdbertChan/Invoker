name: "Roadmap Core WF-INV-74: Headless entrypoint decomposition"
description: |
  Implements Roadmap Core issue INV-74 as a standalone chained workflow.

  Decision record and experimentation are first-class deliverables: experiment artifacts
  must be committed during workflow execution and consumed by implementation tasks.
onFinish: pull_request
mergeMode: external_review
repoUrl: https://github.com/EdbertChan/Invoker
tasks:
  - id: experiment-inv-74
    description: |
      Design experiment and alternative proof task for INV-74.
      Goal: Decompose headless entrypoint into explicit startup modules.
      Motivation: Reduce monolithic flow and preserve cross-surface parity.
      Alternative considerations: Layered pipeline modules vs vertical command slices.
      Implementation details: 1) Introduce or adjust boundaries in `packages/app/src/headless.ts`, `packages/runtime-service/src/composition.ts`, `packages/app/src/headless-delegation.ts`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-74/experiment-brief.md` and consume it in implementation.
      Layer: contact_surface
      Feature state: active
      Files:
      - packages/app/src/headless.ts
      - packages/runtime-service/src/composition.ts
      - packages/app/src/headless-delegation.ts
      - docs/context/inv-74/experiment-brief.md
      Change types:
      - modify
      - docs-only
      Acceptance criteria:
      - Produce measurable comparison criteria for chosen and alternative designs.
      - Record verdict per option: Supported / Rejected / Deferred.
      - Commit `docs/context/inv-74/experiment-brief.md` with experiment findings and explicit thresholds.
    prompt: |
      You must design an experiment brief for INV-74 and ensure deterministic evaluation.
      Goal: Decompose headless entrypoint into explicit startup modules.
      Motivation: Reduce monolithic flow and preserve cross-surface parity.
      Implementation details: 1) Introduce or adjust boundaries in `packages/app/src/headless.ts`, `packages/runtime-service/src/composition.ts`, `packages/app/src/headless-delegation.ts`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-74/experiment-brief.md` and consume it in implementation.
      Alternative considerations: Layered pipeline modules vs vertical command slices.
      Chosen design: Layered pipeline modules.
      Why chosen over alternatives: Aligns with composition seams and reduces cross-command duplication risk.
      Experiment plan: Implement a startup slice and compare with a vertical-slice spike.
      Alternative proof evidence: Use parity pass-rate, touched-file count, and cohesion scoring.
      Alternative considerations: Use experiment findings to compare retained and rejected designs before implementation decisions.
      Decision gate: Adopt only if parity is green and churn is not worse than alternative.
      Concrete files to inspect and reference: `packages/app/src/headless.ts`, `packages/runtime-service/src/composition.ts`, `packages/app/src/headless-delegation.ts`.
      You must create or update `docs/context/inv-74/experiment-brief.md` and commit it in this task.
      Ensure each alternative has deterministic command(s), expected outputs, and pass/fail thresholds.
    dependencies: []

  - id: implement-inv-74
    description: |
      Implement chosen design for INV-74 after experiment framing.
      Goal: Decompose headless entrypoint into explicit startup modules.
      Motivation: Reduce monolithic flow and preserve cross-surface parity.
      Alternative considerations: Layered pipeline modules vs vertical command slices.
      Implementation details: 1) Introduce or adjust boundaries in `packages/app/src/headless.ts`, `packages/runtime-service/src/composition.ts`, `packages/app/src/headless-delegation.ts`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-74/experiment-brief.md` and consume it in implementation.
      Layer: contact_surface
      Feature state: active
      Files:
      - packages/app/src/headless.ts
      - packages/runtime-service/src/composition.ts
      - packages/app/src/headless-delegation.ts
      - docs/context/inv-74/experiment-brief.md
      Change types:
      - modify
      Acceptance criteria:
      - Code reflects chosen design and references measured experiment outcomes.
      - Rejected/deferred alternatives are documented with reasons.
      - Implementation explicitly consumes `docs/context/inv-74/experiment-brief.md` findings.
    prompt: |
      You must implement INV-74 using chosen design Layered pipeline modules. and ensure acceptance criteria are verified.
      Goal: Decompose headless entrypoint into explicit startup modules.
      Motivation: Reduce monolithic flow and preserve cross-surface parity.
      Implementation details: 1) Introduce or adjust boundaries in `packages/app/src/headless.ts`, `packages/runtime-service/src/composition.ts`, `packages/app/src/headless-delegation.ts`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-74/experiment-brief.md` and consume it in implementation.
      Alternative considerations: Use experiment findings to compare retained and rejected designs before implementation decisions.
      Decision gate: Adopt only if parity is green and churn is not worse than alternative.
      Concrete files to update or validate: `packages/app/src/headless.ts`, `packages/runtime-service/src/composition.ts`, `packages/app/src/headless-delegation.ts`.
      You must read `docs/context/inv-74/experiment-brief.md` and apply its decisions/thresholds to implementation choices.
      Ensure targeted tests are added or updated and verify expected outcomes before final regression.
    dependencies:
      - experiment-inv-74

  - id: verify-inv-74
    description: |
      Targeted verification for INV-74.
      Goal:
      Complete verify-inv-74 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: app_regression
      Feature state: active
      Files:
      - tests
      - docs/context/inv-74/experiment-brief.md
      Change types:
      - test-only
      Acceptance criteria:
      - cd packages/app && pnpm test exits 0.
      - Proof verdicts are reflected in `docs/context/inv-74/experiment-brief.md` and workflow output notes.
    command: "cd packages/app && pnpm test"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_2
    dependencies:
      - implement-inv-74

  - id: cleanup-experiment-artifacts-inv-74
