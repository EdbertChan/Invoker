name: "Roadmap Core WF-INV-67: Test stack accountability reorganization"
description: |
  Implements Roadmap Core issue INV-67 as a standalone chained workflow.

  Decision record and experimentation are first-class deliverables: experiment artifacts
  must be committed during workflow execution and consumed by implementation tasks.
onFinish: pull_request
mergeMode: external_review
repoUrl: https://github.com/EdbertChan/Invoker
tasks:
  - id: experiment-inv-67
    description: |
      Design experiment and alternative proof task for INV-67.
      Goal: Reorganize test stack and enforce ownership/accountability.
      Motivation: Create stable baseline before throughput optimization.
      Alternative considerations: Lane-based taxonomy vs package-centric ownership.
      Implementation details: 1) Introduce or adjust boundaries in `scripts/run-all-tests.sh`, `scripts/workspace-test.sh`, `package.json`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-67/experiment-brief.md` and consume it in implementation.
      Layer: app_regression
      Feature state: active
      Files:
      - scripts/run-all-tests.sh
      - scripts/workspace-test.sh
      - package.json
      - docs/context/inv-67/experiment-brief.md
      Change types:
      - modify
      - docs-only
      Acceptance criteria:
      - Produce measurable comparison criteria for chosen and alternative designs.
      - Record verdict per option: Supported / Rejected / Deferred.
      - Commit `docs/context/inv-67/experiment-brief.md` with experiment findings and explicit thresholds.
    prompt: |
      You must design an experiment brief for INV-67 and ensure deterministic evaluation.
      Goal: Reorganize test stack and enforce ownership/accountability.
      Motivation: Create stable baseline before throughput optimization.
      Implementation details: 1) Introduce or adjust boundaries in `scripts/run-all-tests.sh`, `scripts/workspace-test.sh`, `package.json`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-67/experiment-brief.md` and consume it in implementation.
      Alternative considerations: Lane-based taxonomy vs package-centric ownership.
      Chosen design: Lane-based taxonomy with ownership tags.
      Why chosen over alternatives: Fits current scripts and improves routing simplicity.
      Experiment plan: Pilot ownership tagging and compare routing metrics over two iterations.
      Alternative proof evidence: Use mean-time-to-owner and unresolved-failure percentage.
      Alternative considerations: Use experiment findings to compare retained and rejected designs before implementation decisions.
      Decision gate: Keep taxonomy only if routing speed and ownership clarity improve.
      Concrete files to inspect and reference: `scripts/run-all-tests.sh`, `scripts/workspace-test.sh`, `package.json`.
      You must create or update `docs/context/inv-67/experiment-brief.md` and commit it in this task.
      Ensure each alternative has deterministic command(s), expected outputs, and pass/fail thresholds.
    dependencies: []

  - id: implement-inv-67
    description: |
      Implement chosen design for INV-67 after experiment framing.
      Goal: Reorganize test stack and enforce ownership/accountability.
      Motivation: Create stable baseline before throughput optimization.
      Alternative considerations: Lane-based taxonomy vs package-centric ownership.
      Implementation details: 1) Introduce or adjust boundaries in `scripts/run-all-tests.sh`, `scripts/workspace-test.sh`, `package.json`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-67/experiment-brief.md` and consume it in implementation.
      Layer: app_regression
      Feature state: active
      Files:
      - scripts/run-all-tests.sh
      - scripts/workspace-test.sh
      - package.json
      - docs/context/inv-67/experiment-brief.md
      Change types:
      - modify
      Acceptance criteria:
      - Code reflects chosen design and references measured experiment outcomes.
      - Rejected/deferred alternatives are documented with reasons.
      - Implementation explicitly consumes `docs/context/inv-67/experiment-brief.md` findings.
    prompt: |
      You must implement INV-67 using chosen design Lane-based taxonomy with ownership tags. and ensure acceptance criteria are verified.
      Goal: Reorganize test stack and enforce ownership/accountability.
      Motivation: Create stable baseline before throughput optimization.
      Implementation details: 1) Introduce or adjust boundaries in `scripts/run-all-tests.sh`, `scripts/workspace-test.sh`, `package.json`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-67/experiment-brief.md` and consume it in implementation.
      Alternative considerations: Use experiment findings to compare retained and rejected designs before implementation decisions.
      Decision gate: Keep taxonomy only if routing speed and ownership clarity improve.
      Concrete files to update or validate: `scripts/run-all-tests.sh`, `scripts/workspace-test.sh`, `package.json`.
      You must read `docs/context/inv-67/experiment-brief.md` and apply its decisions/thresholds to implementation choices.
      Ensure targeted tests are added or updated and verify expected outcomes before final regression.
    dependencies:
      - experiment-inv-67

  - id: verify-inv-67
    description: |
      Targeted verification for INV-67.
      Goal:
      Complete verify-inv-67 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: app_regression
      Feature state: active
      Files:
      - tests
      - docs/context/inv-67/experiment-brief.md
      Change types:
      - test-only
      Acceptance criteria:
      - cd packages/app && pnpm test exits 0.
      - Proof verdicts are reflected in `docs/context/inv-67/experiment-brief.md` and workflow output notes.
    command: "cd packages/app && pnpm test"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_2
    dependencies:
      - implement-inv-67

  - id: cleanup-experiment-artifacts-inv-67
    description: |
      Cleanup persisted experiment artifact for INV-67 before final regression.
      Goal:
      Complete cleanup-experiment-artifacts-inv-67 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: docs
      Feature state: active
      Files:
      - docs/context/inv-67/experiment-brief.md
      Change types:
      - delete
      Acceptance criteria:
      - `docs/context/inv-67/experiment-brief.md` is removed from the branch.
      - Cleanup commit is present before final regression task.
    command: 'rm -f docs/context/inv-67/experiment-brief.md && git add docs/context/inv-67/experiment-brief.md && git commit -m "cleanup(inv-67/experiment-brief): remove artifact after implementation handoff"'
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - experiment-inv-67
      - implement-inv-67
      - verify-inv-67

  - id: regression-inv-67
    description: |
      Final regression gate for INV-67 workflow.
      Goal:
      Complete regression-inv-67 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: app_regression
      Feature state: active
      Files:
      - repository
      Change types:
      - none
      Acceptance criteria:
      - pnpm run test:all exits 0.
      - Workflow notes include proof verdicts for each alternative.
      Layer exception: allowed — final regression intentionally depends on docs cleanup to guarantee artifact removal before gate.
    command: "pnpm run test:all"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_2
    dependencies:
      - experiment-inv-67
      - implement-inv-67
      - verify-inv-67
      - cleanup-experiment-artifacts-inv-67
