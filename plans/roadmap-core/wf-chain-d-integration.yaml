name: "Roadmap Core Chain D Integration"
description: |
  Chain-level integration workflow for Roadmap Core chain D.
  Verifies cumulative behavior after all issue workflows in the chain complete.
onFinish: pull_request
mergeMode: external_review
repoUrl: https://github.com/EdbertChan/Invoker
baseBranch: "plan/roadmap-core-wf-inv-143-workflow-submission-storm-lag-mitigation"
externalDependencies:
  - workflowId: "wf-1778135761282-53"
    requiredStatus: review_ready

tasks:
  - id: verify-chain-d-targeted
    description: |
      Targeted chain D regression.
      Goal:
      Verify cumulative chain D behavior before final gate.
      Motivation:
      Preserve deterministic chain-level verification with explicit rationale.
      Alternative considerations:
      - rely on implicit workflow-level context only.
      - collapse targeted verification into final regression only.
      Implementation details:
      - execute the scoped verification command for this task.
      - keep dependency order explicit before final regression.
      Layer: app_regression
      Feature state: active
      Files:
      - packages/workflow-core
      Change types:
      - test-only
      Acceptance criteria:
      - cd packages/workflow-core && pnpm test exits 0.
    command: "cd packages/workflow-core && pnpm test"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_2
    dependencies: []

  - id: regression-chain-d
    description: |
      Final chain D regression gate.
      Goal:
      Verify cumulative chain D behavior before final gate.
      Motivation:
      Preserve deterministic chain-level verification with explicit rationale.
      Alternative considerations:
      - rely on implicit workflow-level context only.
      - collapse targeted verification into final regression only.
      Implementation details:
      - execute the scoped verification command for this task.
      - keep dependency order explicit before final regression.
      Layer: app_regression
      Feature state: active
      Files:
      - repository
      Change types:
      - none
      Acceptance criteria:
      - pnpm run test:all exits 0.
    command: "pnpm run test:all"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_2
    dependencies:
      - verify-chain-d-targeted
