name: "Roadmap Core WF-INV-88: Retry semantic simplification"
description: |
  Implements Roadmap Core issue INV-88 as a standalone chained workflow.

  Decision record and experimentation are first-class deliverables: experiment artifacts
  must be committed during workflow execution and consumed by implementation tasks.
onFinish: pull_request
mergeMode: external_review
repoUrl: https://github.com/EdbertChan/Invoker
baseBranch: "__UPSTREAM_FEATURE_BRANCH__"
externalDependencies:
  - workflowId: "__WF_INV_90_WORKFLOW_ID__"
    requiredStatus: review_ready

tasks:
  - id: experiment-inv-88
    description: |
      Design experiment and alternative proof task for INV-88.
      Goal: Simplify retry semantics to one clear execution model.
      Motivation: Reduce edge-case divergence and stale-state bugs.
      Alternative considerations: Single orchestrator entrypoint vs multi-entrypoint policy translator.
      Implementation details: 1) Introduce or adjust boundaries in `packages/workflow-core/src/orchestrator.ts`, `packages/workflow-core/src/__tests__/orchestrator.test.ts`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-88/experiment-brief.md` and consume it in implementation.
      Layer: domain
      Feature state: active
      Files:
      - packages/workflow-core/src/orchestrator.ts
      - packages/workflow-core/src/__tests__/orchestrator.test.ts
      - docs/context/inv-88/experiment-brief.md
      Change types:
      - modify
      - docs-only
      Acceptance criteria:
      - Produce measurable comparison criteria for chosen and alternative designs.
      - Record verdict per option: Supported / Rejected / Deferred.
      - Commit `docs/context/inv-88/experiment-brief.md` with experiment findings and explicit thresholds.
    prompt: |
      You must design an experiment brief for INV-88 and ensure deterministic evaluation.
      Goal: Simplify retry semantics to one clear execution model.
      Motivation: Reduce edge-case divergence and stale-state bugs.
      Implementation details: 1) Introduce or adjust boundaries in `packages/workflow-core/src/orchestrator.ts`, `packages/workflow-core/src/__tests__/orchestrator.test.ts`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-88/experiment-brief.md` and consume it in implementation.
      Alternative considerations: Single orchestrator entrypoint vs multi-entrypoint policy translator.
      Chosen design: Single orchestrator retry entrypoint.
      Why chosen over alternatives: Minimizes semantic drift and branching.
      Experiment plan: Route all retry callers through a single entrypoint shim and replay regressions.
      Alternative proof evidence: Use mismatch incident count and branch-complexity deltas.
      Alternative considerations: Use experiment findings to compare retained and rejected designs before implementation decisions.
      Decision gate: Keep single-entry model only if parity holds and branching shrinks.
      Concrete files to inspect and reference: `packages/workflow-core/src/orchestrator.ts`, `packages/workflow-core/src/__tests__/orchestrator.test.ts`.
      You must create or update `docs/context/inv-88/experiment-brief.md` and commit it in this task.
      Ensure each alternative has deterministic command(s), expected outputs, and pass/fail thresholds.
    dependencies: []

  - id: implement-inv-88
    description: |
      Implement chosen design for INV-88 after experiment framing.
      Goal: Simplify retry semantics to one clear execution model.
      Motivation: Reduce edge-case divergence and stale-state bugs.
      Alternative considerations: Single orchestrator entrypoint vs multi-entrypoint policy translator.
      Implementation details: 1) Introduce or adjust boundaries in `packages/workflow-core/src/orchestrator.ts`, `packages/workflow-core/src/__tests__/orchestrator.test.ts`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-88/experiment-brief.md` and consume it in implementation.
      Layer: domain
      Feature state: active
      Files:
      - packages/workflow-core/src/orchestrator.ts
      - packages/workflow-core/src/__tests__/orchestrator.test.ts
      - docs/context/inv-88/experiment-brief.md
      Change types:
      - modify
      Acceptance criteria:
      - Code reflects chosen design and references measured experiment outcomes.
      - Rejected/deferred alternatives are documented with reasons.
      - Implementation explicitly consumes `docs/context/inv-88/experiment-brief.md` findings.
    prompt: |
      You must implement INV-88 using chosen design Single orchestrator retry entrypoint. and ensure acceptance criteria are verified.
      Goal: Simplify retry semantics to one clear execution model.
      Motivation: Reduce edge-case divergence and stale-state bugs.
      Implementation details: 1) Introduce or adjust boundaries in `packages/workflow-core/src/orchestrator.ts`, `packages/workflow-core/src/__tests__/orchestrator.test.ts`. 2) Migrate call sites in deterministic order with minimal blast radius. 3) Add focused regression coverage near touched logic. 4) Persist experiment artifact at `docs/context/inv-88/experiment-brief.md` and consume it in implementation.
      Alternative considerations: Use experiment findings to compare retained and rejected designs before implementation decisions.
      Decision gate: Keep single-entry model only if parity holds and branching shrinks.
      Concrete files to update or validate: `packages/workflow-core/src/orchestrator.ts`, `packages/workflow-core/src/__tests__/orchestrator.test.ts`.
      You must read `docs/context/inv-88/experiment-brief.md` and apply its decisions/thresholds to implementation choices.
      Ensure targeted tests are added or updated and verify expected outcomes before final regression.
    dependencies:
      - experiment-inv-88

  - id: verify-inv-88
    description: |
      Targeted verification for INV-88.
      Goal:
      Complete verify-inv-88 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: app_regression
      Feature state: active
      Files:
      - tests
      - docs/context/inv-88/experiment-brief.md
      Change types:
      - test-only
      Acceptance criteria:
      - cd packages/workflow-core && pnpm test exits 0.
      - Proof verdicts are reflected in `docs/context/inv-88/experiment-brief.md` and workflow output notes.
    command: "cd packages/workflow-core && pnpm test"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_2
    dependencies:
      - implement-inv-88

  - id: cleanup-experiment-artifacts-inv-88
    description: |
      Cleanup persisted experiment artifact for INV-88 before final regression.
      Goal:
      Complete cleanup-experiment-artifacts-inv-88 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: docs
      Feature state: active
      Files:
      - docs/context/inv-88/experiment-brief.md
      Change types:
      - delete
      Acceptance criteria:
      - `docs/context/inv-88/experiment-brief.md` is removed from the branch.
      - Cleanup commit is present before final regression task.
    command: 'rm -f docs/context/inv-88/experiment-brief.md && git add docs/context/inv-88/experiment-brief.md && git commit -m "cleanup(inv-88/experiment-brief): remove artifact after implementation handoff"'
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - experiment-inv-88
      - implement-inv-88
      - verify-inv-88

  - id: regression-inv-88
    description: |
      Final regression gate for INV-88 workflow.
      Goal:
      Complete regression-inv-88 with explicit rationale and deterministic verification.
      Motivation:
      Keep review intent explicit for command-only implementation tasks under strict atomicity lint.
      Alternative considerations:
      - rely on implicit workflow-level rationale only.
      - defer rationale to neighboring tasks instead of this command task.
      Implementation details:
      - execute the scoped command for this task and enforce stated acceptance criteria.
      - preserve dependency ordering and final regression determinism.
      Layer: app_regression
      Feature state: active
      Files:
      - repository
      Change types:
      - none
      Acceptance criteria:
      - pnpm run test:all exits 0.
      - Workflow notes include proof verdicts for each alternative.
      Layer exception: allowed — final regression intentionally depends on docs cleanup to guarantee artifact removal before gate.
    command: "pnpm run test:all"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_2
    dependencies:
      - experiment-inv-88
      - implement-inv-88
      - verify-inv-88
      - cleanup-experiment-artifacts-inv-88
