name: "Cost Query Step 1: normalize usage schema (replacement v2)"
description: |
  Goal:
  - Define a provider-agnostic cost/usage type contract that downstream extraction,
    rollups, and CLI output can share without provider-specific branching.

  Motivation:
  - Current code has session IDs and transcripts but no normalized usage type
    contract, which creates ambiguity for later cost attribution and aggregation.

  Alternatives considered:
  - Option A (chosen): one normalized provider-agnostic schema.
  - Option B: provider-specific schemas translated at query output time.

  Why chosen:
  - A single schema keeps parsing/aggregation/output deterministic and testable,
    while Option B spreads translation logic and increases branch complexity.

  Implementation contract:
  - Add types for usage events, totals, groups, and rollup result.
  - Include confidence (`exact|estimated|unknown`) and pricing metadata fields.
  - Keep fields additive/backward-compatible for future providers.
onFinish: pull_request
mergeMode: external_review
baseBranch: master
repoUrl: git@github.com:EdbertChan/Invoker.git
executorType: worktree

tasks:
  - id: implement-normalized-cost-types
    description: |
      Layer: domain
      Feature state: active
      Goal:
      - Define a provider-agnostic normalized type system for usage events and rollups.
      Motivation:
      - Ensure extraction/rollup/query layers share one contract and avoid provider branching drift.
      Alternative considerations:
      - Option A (chosen): one normalized provider-agnostic schema
      - Option B: provider-specific schemas translated at query time
      Chosen design rationale:
      - One stable shape reduces branching in downstream rollups and queries.
      Implementation details:
      - Add identity, attribution, usage, pricing/meta, and rollup totals/count fields.
      - Export types from contracts index for cross-package imports.
      Acceptance criteria:
      - Types support Codex/Claude events plus confidence metadata.
      - Downstream modules can import shared types without provider-specific conditionals.
    prompt: |
      Goal:
      - Implement a provider-agnostic cost/usage contract used uniformly across parsing, rollups, and formatting.
      Motivation:
      - Keep consumer signatures stable and avoid provider-specific conditional branching.
      Alternative considerations:
      - Option A (chosen): one normalized schema used across providers.
      - Option B: provider-specific schemas translated later during query formatting.
      Implementation details:
      - Define shared interfaces covering identity, attribution, usage, pricing/meta, and rollup totals.
      - Export contracts centrally to preserve cross-package import ergonomics.
      Files:
      - packages/contracts/src/types.ts
      - packages/contracts/src/index.ts
      - packages/app/src/formatter.ts
      - packages/contracts/src/__tests__/*.test.ts
      Implement normalized cost/usage types with these required fields:
      - identity: eventId, agentSessionId, agentName, source
      - attribution: workflowId, taskId, attemptId, executorType
      - usage: inputTokens, outputTokens, cachedTokens, totalTokens
      - pricing/meta: model, pricingVersion, estimatedCostUsd, confidence
      - rollup: totals fields + unknownConfidenceCount + missingUsageCount
      Export these types from contracts index and ensure consumers can import
      without provider-specific conditional types.
      Add or update tests that prove multiple provider fixture events can map to the same shape.
      Competing-design proof:
      - Demonstrate (via tests/fixtures) that provider-specific-only schema causes extra query branching.
      - Demonstrate chosen schema keeps parser/formatter signatures uniform.
    dependencies: []

  - id: run-domain-tests
    description: |
      Layer: app_regression
      Feature state: active
      Goal:
      - Validate normalized schema compiles and tests pass in contracts package.
      Motivation:
      - Catch type contract regressions immediately after schema introduction.
      Alternative considerations:
      - Option A (chosen): focused package tests.
      - Option B: rely only on final full-suite gate.
      Implementation details:
      - Execute contracts package test lane before global regression.
      Acceptance criteria:
      - Relevant package tests for schema changes pass.
    command: "cd packages/contracts && pnpm test"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - implement-normalized-cost-types

  - id: post-fix-regression
    description: |
      Layer: app_regression
      Feature state: active
      Goal:
      - Run terminal full-repo regression gate for this workflow.
      Motivation:
      - Ensure no cross-package regressions from schema changes.
      Alternative considerations:
      - Option A (chosen): full repository suite.
      - Option B: package-only test scope.
      Implementation details:
      - Execute `pnpm run test:all` after all prior tasks complete.
      Acceptance criteria:
      - Full repository regression passes.
    command: "pnpm run test:all"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - implement-normalized-cost-types
      - run-domain-tests
