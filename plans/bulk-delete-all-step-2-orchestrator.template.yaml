name: "Bulk Delete-All Step 2: orchestrator suppression option"
description: |
  Goal:
  Support delete-all execution without per-task removal delta fan-out.

  Motivation:
  Keep a single orchestrator delete-all implementation while allowing callers to
  choose whether per-task remove deltas are published.

  Implementation details:
  - add `publishRemovalDeltas?: boolean` option to orchestrator delete-all path.
  - default to `true` for compatibility and skip only remove-delta publication when false.

  Alternative considerations:
  - duplicate behavior in a second method `deleteAllWorkflowsBulk()`.
  - publish deltas then filter later in app/main transport.

  Competing-design proof:
  - verify duplication risk and invariant drift from split methods.
  - verify transport-layer filtering still incurs unnecessary publication work.

  Why this design is better:
  Source-level suppression keeps lifecycle logic centralized and deterministic.
onFinish: pull_request
mergeMode: external_review
baseBranch: master
repoUrl: git@github.com:EdbertChan/Invoker.git
executorType: worktree

externalDependencies:
  - workflowId: "__UPSTREAM_WORKFLOW_ID__"
    requiredStatus: completed

tasks:
  - id: add-delete-all-removal-delta-flag
    description: |
      Layer: domain
      Feature state: active
      Goal:
      Add a compatibility-safe switch for removal-delta publication.
      Motivation:
      Keep delete-all side effects identical except optional remove-delta emission.
      Implementation details:
      - thread `publishRemovalDeltas?: boolean` through orchestrator delete-all.
      - preserve DB purge, scheduler clear, and in-memory clear semantics.
      Alternative considerations:
      - separate bulk method with duplicate lifecycle logic.
      - app-layer suppression after message publication.
      Competing-design proof:
      - show split-method approach increases drift and maintenance risk.
      - show post-publication suppression does not remove core overhead.
      Why this design is better:
      - one method, one lifecycle, explicit option at source of truth.
      Files:
      - packages/workflow-core/src/orchestrator.ts
      - packages/workflow-core/src/types.ts
      Change types:
      - add optional `publishRemovalDeltas` option on delete-all path
      - default behavior remains legacy-compatible (`true`)
      Acceptance criteria:
      - default delete-all path still publishes removal deltas.
      - opt-out path performs DB/task cleanup without publishing per-task removals.
    prompt: |
      Goal:
      Deliver `add-delete-all-removal-delta-flag` with explicit, reviewable intent.
      Motivation:
      Keep implementation rationale explicit so lint and reviewers can verify intent.
      Alternative considerations:
      - Keep this prompt concise without rationale sections.
      - Rely only on task description for rationale context.
      Implementation details:
      - Apply the file-level changes listed below and verify all acceptance expectations.
      Update `packages/workflow-core/src/orchestrator.ts` and
      `packages/workflow-core/src/types.ts` to accept an options object containing
      `publishRemovalDeltas?: boolean`, defaulting to true. You must thread the option
      through the delete-all implementation and ensure per-task `removed` delta
      publication is skipped when false, while preserving persistence cleanup and
      in-memory state reset. You must verify default behavior still publishes remove deltas.
    dependencies: []

  - id: verify-orchestrator-tests
    description: |
      Layer: app_regression
      Feature state: active
      Goal:
      Define the expected outcome for `verify-orchestrator-tests`.
      Motivation:
      Preserve reviewability and explicit implementation rationale for this step.
      Alternative considerations:
      - Keep this step implicit in broader workflow text only.
      - Rely on command names without per-task rationale headings.
      Implementation details:
      - Execute this task exactly as specified and verify stated acceptance criteria.
      Validate domain behavior and backward compatibility.
    command: "cd packages/workflow-core && pnpm test -- src/__tests__/orchestrator.test.ts"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - add-delete-all-removal-delta-flag

  - id: post-fix-regression
    description: |
      Layer: app_regression
      Feature state: active
      Goal:
      Define the expected outcome for `post-fix-regression`.
      Motivation:
      Preserve reviewability and explicit implementation rationale for this step.
      Alternative considerations:
      - Keep this step implicit in broader workflow text only.
      - Rely on command names without per-task rationale headings.
      Implementation details:
      - Execute this task exactly as specified and verify stated acceptance criteria.
      Final regression gate required for merge-ready implementation workflows.
    command: "pnpm run test:all"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - add-delete-all-removal-delta-flag
      - verify-orchestrator-tests
