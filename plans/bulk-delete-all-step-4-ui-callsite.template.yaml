name: "Bulk Delete-All Step 4: UI callsite activation"
description: |
  Goal:
  Switch UI delete-history to the bulk command path by default.

  Motivation:
  Remove renderer exposure to high-cardinality `removed` delta batches while
  preserving confirmation UX and local clear/reset behavior.

  Implementation details:
  - update UI delete handler to call `invoker.deleteAllWorkflowsBulk()`.
  - keep existing prompt, reset, and view-state clearing semantics.

  Alternative considerations:
  - optimize renderer delta-application logic while keeping legacy command.
  - invoke bulk command but replay synthetic remove deltas in renderer.

  Competing-design proof:
  - compare performance and blast radius with renderer-only optimization.
  - verify synthetic replay reintroduces the same high-cardinality risk.

  Why this design is better:
  Minimal callsite change removes hotspot exposure without broad renderer refactor.
onFinish: pull_request
mergeMode: external_review
baseBranch: master
repoUrl: git@github.com:EdbertChan/Invoker.git
executorType: worktree

externalDependencies:
  - workflowId: "__UPSTREAM_WORKFLOW_ID__"
    requiredStatus: completed

tasks:
  - id: switch-ui-delete-history-to-bulk
    description: |
      Layer: ui_activation
      Feature state: active
      Goal:
      Activate bulk delete-all behavior at the user entrypoint.
      Motivation:
      Preserve UX while routing destructive delete to the new bulk API.
      Implementation details:
      - change `handleDeleteDB` callsite in `packages/ui/src/App.tsx`.
      - update mock invoker typing to include `deleteAllWorkflowsBulk`.
      Alternative considerations:
      - keep legacy method and add renderer batching only.
      - dual-call fallback behavior between bulk and legacy delete.
      Competing-design proof:
      - verify strict single-call behavior to bulk path in tests.
      Why this design is better:
      - explicit UI callsite switch is easiest to reason about and verify.
      Files:
      - packages/ui/src/App.tsx
      - packages/ui/src/types/mock-invoker.ts
      Change types:
      - call `invoker.deleteAllWorkflowsBulk()` from Delete Workflow History path
      - update UI mocks/types to include the new invoker method
      Acceptance criteria:
      - Delete Workflow History invokes the bulk method only.
      - UI clear/reset behavior remains unchanged for users.
    prompt: |
      Goal:
      Deliver `switch-ui-delete-history-to-bulk` with explicit, reviewable intent.
      Motivation:
      Keep implementation rationale explicit so lint and reviewers can verify intent.
      Alternative considerations:
      - Keep this prompt concise without rationale sections.
      - Rely only on task description for rationale context.
      Implementation details:
      - Apply the file-level changes listed below and verify all acceptance expectations.
      Update the Delete Workflow History handler in `packages/ui/src/App.tsx` to call
      `invoker.deleteAllWorkflowsBulk()` instead of `deleteAllWorkflows()`.
      Ensure related mock invoker definitions/types include `deleteAllWorkflowsBulk`
      so tests remain type-safe and representative. You must ensure confirmation and
      local state clear/reset behavior remain unchanged.
    dependencies: []

  - id: verify-ui-delete-repro
    description: |
      Layer: e2e_regression
      Feature state: active
      Goal:
      Define the expected outcome for `verify-ui-delete-repro`.
      Motivation:
      Preserve reviewability and explicit implementation rationale for this step.
      Alternative considerations:
      - Keep this step implicit in broader workflow text only.
      - Rely on command names without per-task rationale headings.
      Implementation details:
      - Execute this task exactly as specified and verify stated acceptance criteria.
      Validate the UI-side delete repro and baseline behavior.
    command: "cd packages/ui && pnpm test -- src/__tests__/delete-history-repro.test.ts"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - switch-ui-delete-history-to-bulk

  - id: post-fix-regression
    description: |
      Layer: e2e_regression
      Feature state: active
      Goal:
      Define the expected outcome for `post-fix-regression`.
      Motivation:
      Preserve reviewability and explicit implementation rationale for this step.
      Alternative considerations:
      - Keep this step implicit in broader workflow text only.
      - Rely on command names without per-task rationale headings.
      Implementation details:
      - Execute this task exactly as specified and verify stated acceptance criteria.
      Final regression gate required for merge-ready implementation workflows.
    command: "pnpm run test:all"
    executorType: ssh
    remoteTargetId: remote_digital_ocean_1
    dependencies:
      - switch-ui-delete-history-to-bulk
      - verify-ui-delete-repro
