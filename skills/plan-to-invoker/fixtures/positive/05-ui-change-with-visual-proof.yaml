# UI Change Plan with Visual Proof
# Description: Demonstrates the required pattern for UI change plans.
# This fixture shows a valid UI workflow with `visualProof: true`, a plan-specific
# screenshot test in `packages/app/e2e/visual-proof.spec.ts`, and an after-state
# capture task that runs `scripts/ui-visual-proof.sh`.

name: "Fix sidebar collapse animation"
description: |
  Fixes the sidebar collapse transition in packages/ui/src/Sidebar.tsx so the width
  change animates smoothly instead of snapping between states.

  The plan adds a plan-specific screenshot case in packages/app/e2e/visual-proof.spec.ts
  and captures after-state visual proof for review in the pull request merge flow.

  Scope stays within the UI surface and its verification path. Existing UI tests and
  the visual proof capture path must continue to work without changing the component API.
visualProof: true
onFinish: pull_request
mergeMode: github
repoUrl: git@github.com:example-org/acme-repo.git
baseBranch: main
featureBranch: fix-sidebar-collapse-animation

tasks:
  - id: add-visual-proof-test
    description: "Add a visual proof E2E test case"
    prompt: |
      In packages/app/e2e/visual-proof.spec.ts, add a sidebar-specific test that must
      verify the expanded and collapsed UI states for the sidebar animation change.
      The test must import and use captureScreenshot from
      packages/app/e2e/fixtures/electron-app.ts, and it must create screenshots named
      'sidebar-collapse-expanded' and 'sidebar-collapse-collapsed'. Ensure the test
      loads the existing UI scenario, toggles the sidebar, waits for the transition to
      settle, and verifies the expected collapsed class or width state before the second
      screenshot is captured.
    dependencies: []

  - id: fix-sidebar-transition
    description: "Fix the sidebar transition behavior in UI"
    prompt: |
      In packages/ui/src/Sidebar.tsx, update the collapse styling so the width transition
      must be applied before the width value changes. Ensure the component in
      packages/ui/src/Sidebar.tsx still reads the collapse state contract from
      packages/ui/src/types.ts, and verify the expected expanded width and collapsed width
      remain unchanged after the refactor. No public API changes should be introduced, and
      the final implementation must keep the animation logic local to packages/ui/.
    dependencies: []

  - id: run-sidebar-unit-tests
    description: "Run UI package unit tests for regression coverage"
    command: "cd packages/ui && pnpm test 2>&1"
    dependencies: [fix-sidebar-transition]

  - id: capture-visual-proof
    description: "Build app targets and capture after screenshots"
    command: "pnpm --filter @invoker/ui build && pnpm --filter @invoker/app build && bash scripts/ui-visual-proof.sh --label after"
    dependencies: [fix-sidebar-transition, add-visual-proof-test]

  - id: verify-sidebar-regression
    description: "Re-run UI package tests after visual capture"
    command: "cd packages/ui && pnpm test 2>&1"
    dependencies: [run-sidebar-unit-tests, capture-visual-proof]
