# UI Change Plan with Visual Proof
# Description: Demonstrates the required pattern for UI change plans.
# This fixture shows the required combination of visualProof: true, a plan-specific
# visual-proof.spec.ts prompt using captureScreenshot, a ui-visual-proof.sh command task,
# and implementation work that explicitly references packages/ui/.

name: "Fix sidebar collapse animation"
description: |
  Fixes the sidebar collapse transition in packages/ui/src/Sidebar.tsx so the
  component animates smoothly between expanded and collapsed states.

  The plan demonstrates the required UI workflow: update the UI component,
  add a plan-specific visual proof case in packages/app/e2e/visual-proof.spec.ts,
  and capture after-state screenshots for pull request review.

  Verification covers the packages/ui test lane and a visual proof capture step
  so the change can pass schema, atomicity, and verification-plan checks.
visualProof: true
onFinish: pull_request
mergeMode: github
repoUrl: git@github.com:example-org/acme-repo.git
baseBranch: main
featureBranch: fix/sidebar-collapse-animation

tasks:
  - id: add-visual-proof-test
    description: "Add visual proof E2E coverage for sidebar states"
    prompt: |
      In packages/app/e2e/visual-proof.spec.ts, add a plan-specific test that must
      verify the sidebar renders correctly in both expanded and collapsed states.
      The test must import and use captureScreenshot from
      packages/app/e2e/fixtures/electron-app.ts, and it must save one screenshot
      before collapsing and one screenshot after collapsing.

      Ensure the test loads the existing app shell, captures
      captureScreenshot(page, 'sidebar-collapse-expanded'), toggles the sidebar,
      waits for the animation to settle, then captures
      captureScreenshot(page, 'sidebar-collapse-collapsed'). Verify the expected
      collapsed styling is visible in packages/app/e2e/visual-proof.spec.ts and
      keep the helper usage aligned with packages/app/e2e/fixtures/electron-app.ts.
    dependencies: []

  - id: fix-sidebar-transition
    description: "Adjust packages/ui sidebar transition timing behavior"
    prompt: |
      In packages/ui/src/Sidebar.tsx, update the collapse transition so the
      component must animate smoothly instead of snapping closed. Ensure the
      transition styling is applied before the width change, and verify the
      collapsed state still uses the expected narrow width while the expanded
      state keeps the full sidebar width.

      Keep the implementation consistent with types referenced from
      packages/ui/src/types.ts, do not change the public API, and ensure
      packages/ui/src/Sidebar.tsx remains the concrete file that owns the
      transition behavior for this UI fix.
    dependencies: []

  - id: run-sidebar-unit-tests
    description: "Run packages/ui unit tests for regression coverage"
    command: "cd packages/ui && pnpm test 2>&1"
    dependencies: [fix-sidebar-transition]

  - id: capture-visual-proof
    description: "Build app targets and capture after screenshots"
    command: "pnpm --filter @invoker/ui build && pnpm --filter @invoker/app build && bash scripts/ui-visual-proof.sh --label after"
    dependencies: [fix-sidebar-transition, add-visual-proof-test]

  - id: verify-sidebar-regression
    description: "Re-run packages/ui tests after screenshot capture"
    command: "cd packages/ui && pnpm test 2>&1"
    dependencies: [run-sidebar-unit-tests, capture-visual-proof]
